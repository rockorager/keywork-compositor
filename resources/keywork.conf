# Keywork's built-in configuration.
#
# Copy this file to ~/.config/keywork/config to customize it. A valid empty
# [bindings] section disables all configured bindings.
#
# Input matchers are ANDed within a section. Matching sections are overlaid in
# file order, so later sections can specialize broad defaults. Name matchers
# accept '*' and '?' wildcards; every setting accepts "default".
#
# [input type=touchpad]
# tap=enabled
# natural-scroll=enabled
# disable-while-typing=enabled
#
# [input type=pointer name="Logitech MX Master 3S"]
# accel-profile=flat
# accel-speed=0.25
# scroll-factor=0.75

[general]
focus-follows-mouse=enabled
inner-gap=8
outer-gap=8
blur-radius=16
shadow=enabled
shadow-blur-radius=24
# Colors use #RRGGBB or #RRGGBBAA.
shadow-color=#000000a0
focused-shadow-color=#000000a0

[bindings]
bind=super+h focus left
bind=super+j focus down
bind=super+k focus up
bind=super+l focus right

bind=super+shift+h move-focused left
bind=super+shift+j move-focused down
bind=super+shift+k move-focused up
bind=super+shift+l move-focused right

bind=super+q close focused

bind=super+t set-layout master-stack
bind=super+d set-layout dwindle
bind=super+s set-layout scrolling

bind=super+1 switch-workspace 1
bind=super+2 switch-workspace 2
bind=super+3 switch-workspace 3
bind=super+4 switch-workspace 4
bind=super+5 switch-workspace 5
bind=super+6 switch-workspace 6
bind=super+7 switch-workspace 7
bind=super+8 switch-workspace 8
bind=super+9 switch-workspace 9
bind=super+0 switch-workspace 10

bind=super+shift+1 move-focused-to-workspace 1
bind=super+shift+2 move-focused-to-workspace 2
bind=super+shift+3 move-focused-to-workspace 3
bind=super+shift+4 move-focused-to-workspace 4
bind=super+shift+5 move-focused-to-workspace 5
bind=super+shift+6 move-focused-to-workspace 6
bind=super+shift+7 move-focused-to-workspace 7
bind=super+shift+8 move-focused-to-workspace 8
bind=super+shift+9 move-focused-to-workspace 9
bind=super+shift+0 move-focused-to-workspace 10

bind=super+return run monstar
